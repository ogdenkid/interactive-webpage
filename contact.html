<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <header>
    <h1>Saitama's red gloves and spandex for bald guys</h1>
    <img src="images/one-punch-man.jpg" alt="One Punch Man" class="header-image">
    <nav>
      <a href="index.html" class="button unselected">Home</a>
      <a href="contact.html" class="button selected">contact</a>
    </nav>
  </header>

  
  <form>
    <h1>contact us!</h1>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br>
    
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5" required></textarea><br>

    <button type="submit">Send</button>
  </form>

  <footer>
    <p class="center-footer">created by Robert Pratt</p>
    <a href="https://en.wikipedia.org/wiki/Toilet_paper_orientation">important information</a>
  </footer>
</body>
</html>
